services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8090}:8090"
    depends_on:
      - mongo
    environment:
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_PORT=${MONGO_PORT}
      - MONGO_DATABASE=${MONGO_DATABASE}
      - MONGO_USERNAME=${MONGO_USERNAME}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_AUTH_DATABASE=${MONGO_AUTH_DATABASE}
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/${MONGO_DATABASE}?authSource=${MONGO_AUTH_DATABASE}
      - MICROSERVICE_AUTH_TOKEN=${MICROSERVICE_AUTH_TOKEN}
      - GIT_SERVER_HTTP_URL=${GIT_SERVER_HTTP_URL:-http://git-server:80}
      - GIT_SERVER_SSH_HOST=${GIT_SERVER_SSH_HOST:-git-server}
      - GIT_SERVER_SSH_PORT=${GIT_SERVER_SSH_PORT}
      - JWT_ISSUER_URI=${JWT_ISSUER_URI}
      - JWT_JWK_SET_URI=${JWT_JWK_SET_URI}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - git-net
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "${MONGO_HOST_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  git-net:
    external: true
