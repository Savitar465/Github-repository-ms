name: CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('smithy/**/*.gradle', 'smithy/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x smithy/gradlew

      - name: Generate Smithy Java servers
        run: ./gradlew generateAllJavaServers
        working-directory: smithy

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw -B -DskipTests clean package

  test:
    needs: build
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('smithy/**/*.gradle', 'smithy/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x smithy/gradlew

      - name: Generate Smithy Java servers
        run: ./gradlew generateAllJavaServers
        working-directory: smithy

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B verify

      - name: SonarCloud analysis
        if: ${{ env.SONAR_TOKEN != '' && vars.SONAR_ORGANIZATION != '' }}
        uses: sonarsource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=Savitar465_Github-repository-ms
            -Dsonar.projectName=Github-repository-ms
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.test.binaries=target/test-classes

  docker-push:
    needs: [ build, test ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker image repository
        env:
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          IMAGE_REPO="$DOCKERHUB_REPOSITORY"

          if [ -z "$IMAGE_REPO" ] && [ -f .env ]; then
            IMAGE_REPO=$(grep -E '^DOCKERHUB_REPOSITORY=' .env | tail -n 1 | cut -d '=' -f2- || true)
          fi

          if [ -z "$IMAGE_REPO" ] && [ -f .env.properties ]; then
            IMAGE_REPO=$(grep -E '^DOCKERHUB_REPOSITORY=' .env.properties | tail -n 1 | cut -d '=' -f2- || true)
          fi

          if [ -z "$IMAGE_REPO" ]; then
            IMAGE_REPO="github-repository-ms"
          fi

          echo "IMAGE_REPO=$IMAGE_REPO" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          labels: |
            org.opencontainers.image.title=Github-repository-ms
            org.opencontainers.image.description=Microservicio de repositorios y metadatos
            org.opencontainers.image.vendor=Githubx
            org.opencontainers.image.url=https://github.com/Savitar465/Github-repository-ms
            org.opencontainers.image.source=https://github.com/Savitar465/Github-repository-ms
            org.opencontainers.image.documentation=https://github.com/Savitar465/Github-repository-ms/blob/main/README.md
            org.opencontainers.image.authors=Savitar465
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPO }}:latest